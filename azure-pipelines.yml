trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-iam-frontend-abac
  - name: nodeVersion
    value: '20.x'

steps:
  - checkout: self
    displayName: Checkout Repository

  - task: NodeTool@0
    inputs:
      versionSpec: $(nodeVersion)
    displayName: Install Node.js

  - script: npm ci || npm install
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Install Dependencies

  - script: |
      printf 'VITE_API_URL=%s\nVITE_HUB_URL=%s\nVITE_GOOGLE_CLIENT_ID=%s\nVITE_IAM_CUSTOM_DOMAIN=%s\n' \
        "$(VITE_API_URL)" \
        "$(VITE_HUB_URL)" \
        "$(VITE_GOOGLE_CLIENT_ID)" \
        "$(VITE_IAM_CUSTOM_DOMAIN)" \
        > .env
      cat .env
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Create .env

  - script: npm run build
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Build Application

  - script: cp staticwebapp.config.json dist/
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Copy Static Web App Config

  - task: AzureStaticWebApp@0
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_IAM)
      app_location: 'dist'
      output_location: ''
      skip_app_build: true
    displayName: Deploy to Azure Static Web App